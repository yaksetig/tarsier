name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install compatible Z3
        run: |
          set -euo pipefail
          version="4.15.4"
          asset="z3-${version}-x64-glibc-2.39"
          root="/tmp/z3"
          archive="${root}/z3.zip"
          mkdir -p "${root}"
          curl -fsSL "https://github.com/Z3Prover/z3/releases/download/z3-${version}/${asset}.zip" -o "${archive}"
          unzip -q -o "${archive}" -d "${root}"
          extracted="${root}/${asset}"
          {
            echo "Z3_SYS_Z3_HEADER=${extracted}/include/z3.h"
            echo "Z3_LIBRARY_PATH_OVERRIDE=${extracted}/bin"
            if [ -n "${LD_LIBRARY_PATH:-}" ]; then
              echo "LD_LIBRARY_PATH=${extracted}/bin:${LD_LIBRARY_PATH}"
            else
              echo "LD_LIBRARY_PATH=${extracted}/bin"
            fi
          } >> "${GITHUB_ENV}"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo tarpaulin --workspace --out xml --output-dir coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
