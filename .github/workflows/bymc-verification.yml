# Full real ByMC parity workflow.
# Runs nightly and stays available for manual replay.
name: ByMC Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # Nightly: 02:00 UTC

jobs:
  build-bymc-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build ByMC Docker image
        run: bash benchmarks/bymc/build-docker.sh

      - name: Save Docker image
        run: docker save tarsier-bymc:latest | gzip > /tmp/tarsier-bymc.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: bymc-docker-image
          path: /tmp/tarsier-bymc.tar.gz
          retention-days: 1

  run-real-bymc:
    needs: build-bymc-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: bymc-docker-image
          path: /tmp

      - name: Load Docker image
        run: gunzip -c /tmp/tarsier-bymc.tar.gz | docker load

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run cross-tool benchmark (real ByMC)
        run: |
          chmod +x benchmarks/bymc/run_bymc.sh
          python3 benchmarks/cross_tool_runner.py \
            --manifest benchmarks/cross_tool_scenarios/scenario_manifest.json \
            --skip-build \
            --tools tarsier,bymc \
            --bymc-binary benchmarks/bymc/run_bymc.sh \
            --bymc-mode real \
            --timeout 300 \
            --out /tmp/cross-tool-real-bymc.json

      - name: Validate real external execution contract
        run: |
          python3 .github/scripts/check_cross_tool_external_execution.py \
            /tmp/cross-tool-real-bymc.json \
            --required-tools tarsier,bymc \
            --require-real-tools bymc

      - name: Verdict parity check
        run: python3 .github/scripts/check_cross_tool_verdict_parity.py /tmp/cross-tool-real-bymc.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bymc-verification-report
          path: /tmp/cross-tool-real-bymc.json
